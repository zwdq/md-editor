<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✏️ Markdown 编辑器</title>
<style>
:root {
  --bg: #1a1a1a; --bg-secondary: #252526; --card: #2a2a2a; --border: #3a3a3a;
  --text: #e0e0e0; --muted: #888; --accent: #30CF79; --accent-soft: rgba(48,207,121,.1);
  --code-bg: #1e1e1e; --selection: rgba(48,207,121,.2);
}
[data-theme="light"] {
  --bg: #ffffff; --bg-secondary: #f7f8fa; --card: #ffffff; --border: #e4e6ef;
  --text: #2c2c2c; --muted: #888; --accent: #30CF79; --accent-soft: rgba(48,207,121,.06);
  --code-bg: #f5f5f5; --selection: rgba(48,207,121,.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: background .25s, color .25s; }
::selection { background: var(--selection); }

header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: var(--card); border-bottom: 1px solid var(--border); height: 48px; flex-shrink: 0; }
header h1 { font-size: 15px; font-weight: 600; }
.header-right { display: flex; gap: 4px; }
.btn { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text); cursor: pointer; font-size: 12px; transition: .15s; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.icon { padding: 5px 8px; font-size: 15px; }

.editor-scroll { flex: 1; overflow-y: auto; }
.editor-area { max-width: 760px; margin: 0 auto; padding: 32px 32px 120px; outline: none; min-height: 100%; }
.editor-area:focus { outline: none; }

.line { position: relative; min-height: 1.8em; padding: 1px 8px; margin: 0 -8px; border-radius: 4px; transition: background .08s; font-size: 16px; line-height: 1.8; }
.line:hover { background: var(--accent-soft); }
.line:focus { outline: none; background: var(--bg-secondary); }
.line.empty::before { content: ""; }

/* Markdown 渲染 */
.line h1 { font-size: 1.8em; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; margin: 0.2em 0; line-height: 1.3; }
.line h2 { font-size: 1.4em; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; margin: 0.2em 0; line-height: 1.3; }
.line h3 { font-size: 1.2em; font-weight: 700; margin: 0.2em 0; }
.line h4 { font-size: 1em; font-weight: 700; margin: 0.2em 0; }
.line h5, .line h6 { font-weight: 700; margin: 0.2em 0; }
.line p { margin: 0; }
.line a { color: var(--accent); }
.line strong { font-weight: 700; }
.line em { font-style: italic; }
.line del { color: var(--muted); }
.line code { font-family: "JetBrains Mono", monospace; font-size: 0.88em; background: var(--code-bg); padding: 2px 6px; border-radius: 4px; }
.line pre { background: var(--code-bg); border-radius: 8px; padding: 14px; overflow-x: auto; border: 1px solid var(--border); }
.line pre code { background: transparent; padding: 0; font-size: 14px; }
.line blockquote { border-left: 4px solid var(--accent); padding: 2px 16px; color: var(--muted); background: var(--accent-soft); border-radius: 0 8px 8px 0; }
.line ul, .line ol { margin: 0; padding-left: 1.6em; }
.line li { margin: 0.1em 0; }
.line img { max-width: 100%; border-radius: 8px; }
.line table { border-collapse: collapse; width: 100%; }
.line th, .line td { border: 1px solid var(--border); padding: 6px 12px; }
.line th { background: var(--bg-secondary); font-weight: 700; }
.line hr { border: 0; border-top: 1px solid var(--border); }
.line .checkbox { list-style: none; margin-left: -1.2em; }
.line .checkbox input { margin-right: 6px; }
.line.editing { font-family: "JetBrains Mono", "SF Mono", Menlo, monospace; font-size: 14px; white-space: pre-wrap; word-break: break-word; }

.statusbar { height: 28px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--muted); background: var(--card); border-top: 1px solid var(--border); flex-shrink: 0; }
.layout { display: flex; flex-direction: column; height: 100vh; }
@media (max-width: 768px) { .editor-area { padding: 16px; } }
</style>
</head>
<body>
<div class="layout">
  <header>
    <h1>✏️ Markdown</h1>
    <div class="header-right">
      <button class="btn" onclick="insertTemplate()">模板</button>
      <button class="btn" onclick="downloadMD()">下载</button>
      <button class="btn" onclick="document.getElementById('uploadFile').click()">打开</button>
      <input type="file" id="uploadFile" accept=".md,.txt,.markdown" style="display:none" onchange="uploadFile(event)">
      <button class="btn" onclick="copyHTML()">复制HTML</button>
      <button class="btn icon" id="themeToggle" onclick="toggleTheme()">🌙</button>
    </div>
  </header>
  <div class="editor-scroll" id="scroll">
    <div class="editor-area" id="editor"></div>
  </div>
  <div class="statusbar">
    <span id="charCount">0 字 · 0 行</span>
    <span>Typora 风格 · 点击编辑 · 失焦渲染</span>
  </div>
</div>

<script>
const editor = document.getElementById("editor");
const scroll = document.getElementById("scroll");
let lines = []; // [{text: "markdown源码", html: "渲染HTML"}]
let activeLine = -1;

// ── 主题 ──
function toggleTheme() {
  const cur = document.documentElement.getAttribute("data-theme") || "light";
  const next = cur === "light" ? "dark" : "light";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("md_theme", next);
  document.getElementById("themeToggle").textContent = next === "light" ? "🌙" : "☀️";
}
(function(){ const t = localStorage.getItem("md_theme") || "light"; document.documentElement.setAttribute("data-theme", t); document.addEventListener("DOMContentLoaded", () => { document.getElementById("themeToggle").textContent = t === "light" ? "🌙" : "☀️"; }); })();

// ── Markdown 单行渲染 ──
function renderLine(text) {
  let html = text;
  if (!html.trim()) return "";
  html = html.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  // 行内代码先提取
  const codes = [];
  html = html.replace(/`([^`]+)`/g, (m, c) => { codes.push(c); return `\x00${codes.length-1}\x00`; });
  // 标题
  if (/^######\s/.test(html)) html = `<h6>${html.replace(/^######\s+/, "")}</h6>`;
  else if (/^#####\s/.test(html)) html = `<h5>${html.replace(/^#####\s+/, "")}</h5>`;
  else if (/^####\s/.test(html)) html = `<h4>${html.replace(/^####\s+/, "")}</h4>`;
  else if (/^###\s/.test(html)) html = `<h3>${html.replace(/^###\s+/, "")}</h3>`;
  else if (/^##\s/.test(html)) html = `<h2>${html.replace(/^##\s+/, "")}</h2>`;
  else if (/^#\s/.test(html)) html = `<h1>${html.replace(/^#\s+/, "")}</h1>`;
  else if (/^---+$/.test(html.trim())) html = "<hr>";
  else if (/^&gt;\s?/.test(html)) html = `<blockquote><p>${html.replace(/^&gt;\s?/, "")}</p></blockquote>`;
  else if (/^-\s\[(x|X|\s)\]\s/.test(html)) {
    const checked = /\[x|X\]/.test(html) ? "checked" : "";
    const t2 = html.replace(/^-\s\[(x|X|\s)\]\s/, "");
    html = `<ul><li class="checkbox"><input type="checkbox" ${checked} disabled> ${t2}</li></ul>`;
  }
  else if (/^[-*+]\s+/.test(html)) html = `<ul><li>${html.replace(/^[-*+]\s+/, "")}</li></ul>`;
  else if (/^\d+\.\s+/.test(html)) html = `<ol><li>${html.replace(/^\d+\.\s+/, "")}</li></ol>`;
  else if (/^\|.*\|$/.test(html.trim())) {
    const cells = html.trim().split("|").map(s => s.trim()).filter(s => s !== "");
    if (/^[-:\s]+$/.test(cells.join(""))) html = "";
    else html = `<table><tr>${cells.map(c => `<td>${c}</td>`).join("")}</tr></table>`;
  }
  else html = `<p>${html}</p>`;
  // 还原行内代码
  html = html.replace(/\x00(\d+)\x00/g, (m, i) => `<code>${codes[parseInt(i)]}</code>`);
  // 粗体斜体删除线
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>");
  html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
  html = html.replace(/~~(.+?)~~/g, "<del>$1</del>");
  // 链接图片
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  return html;
}

// ── 初始化行 ──
function initLines(text) {
  lines = text.split("\n").map(t => ({ text: t, html: renderLine(t) }));
  if (lines.length === 0) lines.push({ text: "", html: "" });
}

// ── 创建行元素 ──
function createLineEl(i) {
  const div = document.createElement("div");
  div.className = "line" + (lines[i].text.trim() === "" ? " empty" : "");
  div.dataset.index = i;
  div.contentEditable = "true";
  div.spellcheck = false;
  div.innerHTML = lines[i].html || "";

  // focus: 显示源码
  div.addEventListener("focus", function() {
    onLineFocus(i);
  });

  // input: 实时保存源码到内存
  div.addEventListener("input", function() {
    if (div.classList.contains("editing")) {
      lines[i].text = div.textContent;
    }
  });

  // blur: 兜底渲染
  div.addEventListener("blur", function() {
    if (activeLine === i) {
      commitLine(i);
      activeLine = -1;
      saveContent();
    }
  });

  return div;
}

// ── 全量渲染 ──
function renderAll() {
  editor.innerHTML = "";
  if (lines.length === 0) lines.push({ text: "", html: "" });
  lines.forEach((_, i) => {
    editor.appendChild(createLineEl(i));
  });
  updateStatus();
}

// ── 行聚焦：换成源码 ──
function onLineFocus(i) {
  // 先渲染上一行
  if (activeLine >= 0 && activeLine !== i) {
    commitLine(activeLine);
  }
  activeLine = i;
  const div = editor.children[i];
  if (!div) return;
  div.classList.add("editing");
  div.textContent = lines[i].text;
  // 光标放末尾
  const sel = window.getSelection();
  const range = document.createRange();
  range.selectNodeContents(div);
  range.collapse(false);
  sel.removeAllRanges();
  sel.addRange(range);
}

// ── 提交行：换成渲染（从内存读源码）──
function commitLine(i) {
  const div = editor.children[i];
  if (!div) return;
  // 从内存读取（input 事件已实时保存）
  const text = lines[i].text;
  lines[i].html = renderLine(text);
  div.classList.remove("editing");
  div.classList.toggle("empty", text.trim() === "");
  div.innerHTML = lines[i].html || "";
}

// ── 行失焦 ──（去掉 blur 依赖，改为主动触发）
function onLineBlur(i) {
  // 不做任何事，渲染由 onLineFocus/Enter/方向键 主动触发
}

// ── 渲染当前行并切到目标行 ──
function switchToLine(targetIndex) {
  if (activeLine >= 0 && activeLine !== targetIndex) {
    commitLine(activeLine);
    activeLine = -1;
    saveContent();
  }
  const div = editor.children[targetIndex];
  if (div) {
    onLineFocus(targetIndex);
  }
}

// ── 键盘处理 ──
editor.addEventListener("keydown", (e) => {
  const target = e.target.closest(".line");
  if (!target) return;
  const i = parseInt(target.dataset.index);

  // Enter: 拆分新行，当前行立即渲染
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    const offset = getCaretOffset(target);
    const before = target.textContent.slice(0, offset);
    const after = target.textContent.slice(offset);

    // 提交当前行（渲染）
    lines[i].text = before;
    lines[i].html = renderLine(before);
    target.classList.remove("editing");
    target.classList.toggle("empty", before.trim() === "");
    target.innerHTML = lines[i].html || "";

    // 插入新行
    lines.splice(i + 1, 0, { text: after, html: renderLine(after) });
    const newDiv = createLineEl(i + 1);
    editor.insertBefore(newDiv, target.nextSibling);
    refreshIndices();
    newDiv.focus();
    saveContent();
    return;
  }

  // 上方向键：渲染当前行，跳到上一行
  if (e.key === "ArrowUp" && i > 0) {
    const offset = getCaretOffset(target);
    // 只在光标在第一行时才跳（简化：直接跳）
    e.preventDefault();
    commitLine(i);
    activeLine = -1;
    saveContent();
    const prevDiv = editor.children[i - 1];
    prevDiv.focus();
    return;
  }

  // 下方向键：渲染当前行，跳到下一行
  if (e.key === "ArrowDown" && i < editor.children.length - 1) {
    e.preventDefault();
    commitLine(i);
    activeLine = -1;
    saveContent();
    const nextDiv = editor.children[i + 1];
    nextDiv.focus();
    return;
  }

  // Backspace: 行首合并
  if (e.key === "Backspace") {
    const offset = getCaretOffset(target);
    if (offset === 0 && i > 0) {
      e.preventDefault();
      const curText = target.textContent;
      const prevText = lines[i - 1].text;
      const mergeText = prevText + curText;

      lines[i - 1].text = mergeText;
      lines[i - 1].html = renderLine(mergeText);
      lines.splice(i, 1);
      renderAll();

      const newPrev = editor.children[i - 1];
      newPrev.focus();
      setTimeout(() => {
        newPrev.classList.add("editing");
        newPrev.textContent = mergeText;
        const r = document.createRange();
        const sel = window.getSelection();
        if (newPrev.firstChild) {
          r.setStart(newPrev.firstChild, prevText.length);
          r.collapse(true);
          sel.removeAllRanges();
          sel.addRange(r);
        }
      }, 0);
      activeLine = i - 1;
      saveContent();
    }
  }

  // Tab 缩进
  if (e.key === "Tab") {
    e.preventDefault();
    document.execCommand("insertText", false, "  ");
  }
});

// 获取光标在元素中的字符偏移
function getCaretOffset(el) {
  const sel = window.getSelection();
  if (sel.rangeCount === 0) return 0;
  const range = sel.getRangeAt(0);
  const preRange = range.cloneRange();
  preRange.selectNodeContents(el);
  preRange.setEnd(range.endContainer, range.endOffset);
  return preRange.toString().length;
}

// 粘贴纯文本
editor.addEventListener("paste", (e) => {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData("text");
  document.execCommand("insertText", false, text);
});

function refreshIndices() {
  for (let i = 0; i < editor.children.length; i++) {
    editor.children[i].dataset.index = i;
  }
}

// ── 保存 ──
function saveContent() {
  const text = lines.map(l => l.text).join("\n");
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(() => localStorage.setItem("md_content", text), 500);
  updateStatus();
}

function updateStatus() {
  const text = lines.map(l => l.text).join("");
  document.getElementById("charCount").textContent = text.length + " 字 · " + lines.length + " 行";
}

// ── 文件操作 ──
function downloadMD() {
  const text = lines.map(l => l.text).join("\n");
  const blob = new Blob([text], { type: "text/markdown" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "document-" + new Date().toISOString().slice(0,10) + ".md";
  a.click();
}

function uploadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  file.text().then(text => { initLines(text); renderAll(); saveContent(); });
  event.target.value = "";
}

function copyHTML() {
  const html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{font-family:sans-serif;max-width:760px;margin:40px auto;padding:0 20px;line-height:1.8;}pre{background:#f5f5f5;padding:16px;border-radius:8px;}code{background:#f5f5f5;padding:2px 6px;border-radius:4px;}blockquote{border-left:4px solid #30CF79;padding-left:16px;color:#666;}table{border-collapse:collapse;width:100%;}th,td{border:1px solid #ddd;padding:8px;}img{max-width:100%;}</style></head><body>" + lines.map(l => l.html).join("\n") + "</body></html>";
  navigator.clipboard.writeText(html).then(() => alert("HTML 已复制"));
}

function insertTemplate() {
  const tpl = `# 欢迎使用 Markdown 编辑器

这是一段**粗体**和*斜体*文字，还有~~删除线~~。

## 功能列表

- 按行实时渲染
- 点击编辑，失焦渲染
- Enter 换行自动新建
- Backspace 行首合并上一行

1. 有序列表
2. Tab 缩进

## 代码

行内代码 \`code\`

## 引用

> 这是一段引用

## 任务

- [x] 已完成
- [ ] 未完成

## 表格

| 名称 | 描述 |
|------|------|
| A    | 描述A |

## 链接

[GitHub](https://github.com)

---

点击任意行开始编辑，Enter 换行，失焦自动渲染。`;
  initLines(tpl);
  renderAll();
  saveContent();
}

// ── 初始化 ──
const saved = localStorage.getItem("md_content") || "";
initLines(saved);
renderAll();
</script>
</body>
</html>
