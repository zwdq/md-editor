<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✏️ Markdown 编辑器</title>
<style>
:root {
  --bg: #1a1a1a; --bg-secondary: #252526; --card: #2a2a2a; --border: #3a3a3a;
  --text: #e0e0e0; --muted: #888; --accent: #30CF79; --accent-soft: rgba(48,207,121,.1);
  --code-bg: #1e1e1e; --selection: rgba(48,207,121,.2);
}
[data-theme="light"] {
  --bg: #ffffff; --bg-secondary: #f7f8fa; --card: #ffffff; --border: #e4e6ef;
  --text: #2c2c2c; --muted: #888; --accent: #30CF79; --accent-soft: rgba(48,207,121,.06);
  --code-bg: #f5f5f5; --selection: rgba(48,207,121,.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: background .25s, color .25s; }
::selection { background: var(--selection); }

header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: var(--card); border-bottom: 1px solid var(--border); height: 48px; flex-shrink: 0; }
header h1 { font-size: 15px; font-weight: 600; }
.header-right { display: flex; gap: 4px; }
.btn { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text); cursor: pointer; font-size: 12px; transition: .15s; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.icon { padding: 5px 8px; font-size: 15px; }

.editor-scroll { flex: 1; overflow-y: auto; }
.editor-area { max-width: 760px; margin: 0 auto; padding: 32px 32px 120px; outline: none; min-height: 100%; }
.editor-area:focus { outline: none; }

.line { position: relative; min-height: 1.8em; padding: 1px 8px; margin: 0 -8px; border-radius: 4px; transition: background .08s; font-size: 16px; line-height: 1.8; }
.line:hover { background: var(--accent-soft); }
.line:focus { outline: none; background: var(--bg-secondary); }
.line.empty::before { content: ""; }

/* Markdown 渲染 */
.line h1 { font-size: 1.8em; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; margin: 0.2em 0; line-height: 1.3; }
.line h2 { font-size: 1.4em; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; margin: 0.2em 0; line-height: 1.3; }
.line h3 { font-size: 1.2em; font-weight: 700; margin: 0.2em 0; }
.line h4 { font-size: 1em; font-weight: 700; margin: 0.2em 0; }
.line h5, .line h6 { font-weight: 700; margin: 0.2em 0; }
.line p { margin: 0; }
.line a { color: var(--accent); }
.line strong { font-weight: 700; }
.line em { font-style: italic; }
.line del { color: var(--muted); }
.line code { font-family: "JetBrains Mono", monospace; font-size: 0.88em; background: var(--code-bg); padding: 2px 6px; border-radius: 4px; }
.line pre { background: var(--code-bg); border-radius: 8px; padding: 14px; overflow-x: auto; border: 1px solid var(--border); }
.line pre code { background: transparent; padding: 0; font-size: 14px; }
.line blockquote { border-left: 4px solid var(--accent); padding: 2px 16px; color: var(--muted); background: var(--accent-soft); border-radius: 0 8px 8px 0; }
.line ul, .line ol { margin: 0; padding-left: 1.6em; }
.line li { margin: 0.1em 0; }
.line img { max-width: 100%; border-radius: 8px; }
.line table { border-collapse: collapse; width: 100%; }
.line th, .line td { border: 1px solid var(--border); padding: 6px 12px; }
.line th { background: var(--bg-secondary); font-weight: 700; }
.line hr { border: 0; border-top: 1px solid var(--border); }
.line .checkbox { list-style: none; margin-left: -1.2em; }
.line .checkbox input { margin-right: 6px; }
.line.editing { font-family: "JetBrains Mono", "SF Mono", Menlo, monospace; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
.line.code-line { font-family: "JetBrains Mono", "SF Mono", Menlo, monospace; font-size: 14px; color: var(--text); background: var(--code-bg); border-radius: 0; white-space: pre-wrap; word-break: break-word; }
.line.code-line:first-of-type, .line.code-line:not(.code-line) + .code-line { } 
.line .code-fence { display: inline-block; font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--accent); background: var(--accent-soft); padding: 2px 10px; border-radius: 4px; font-weight: 600; }
.line.code-fence-row { background: var(--code-bg); border-radius: 8px 8px 0 0; padding-top: 8px; }

.statusbar { height: 28px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--muted); background: var(--card); border-top: 1px solid var(--border); flex-shrink: 0; }
.layout { display: flex; flex-direction: column; height: 100vh; }
.main-layout { display: flex; flex: 1; overflow: hidden; }

/* 侧栏 */
.sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
.sidebar-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); }
.sidebar-header h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.sidebar-list { flex: 1; overflow-y: auto; padding: 6px 8px; }

/* 文件夹 */
.folder-group { margin-bottom: 4px; }
.folder-header { display: flex; align-items: center; gap: 4px; padding: 6px 8px; cursor: pointer; border-radius: 6px; font-size: 12px; font-weight: 600; color: var(--text); transition: .12s; user-select: none; }
.folder-header:hover { background: var(--bg-secondary); }
.folder-arrow { font-size: 10px; transition: transform .15s; color: var(--muted); width: 12px; text-align: center; }
.folder-header.collapsed .folder-arrow { transform: rotate(-90deg); }
.folder-name { flex: 1; }
.folder-count { font-size: 11px; color: var(--muted); font-weight: 400; }
.folder-add { opacity: 0; font-size: 14px; color: var(--muted); cursor: pointer; }
.folder-header:hover .folder-add { opacity: .7; }
.folder-add:hover { opacity: 1; color: var(--accent); }
.folder-del { opacity: 0; font-size: 13px; color: var(--muted); cursor: pointer; }
.folder-header:hover .folder-del { opacity: .7; }
.folder-del:hover { opacity: 1; color: #e55; }
.folder-items { overflow: hidden; }
.folder-items.collapsed { display: none; }

.doc-item { padding: 7px 12px 7px 28px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--muted); transition: .12s; margin-bottom: 2px; position: relative; }
.doc-item:hover { background: var(--bg-secondary); color: var(--text); }
.doc-item.active { background: var(--accent-soft); color: var(--accent); }
.doc-item .doc-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.doc-item .doc-time { font-size: 10px; opacity: .5; margin-top: 1px; }
.doc-item .doc-del { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); opacity: 0; font-size: 11px; }
.doc-item:hover .doc-del { opacity: .6; }
.doc-item .doc-del:hover { opacity: 1; color: #e55; }

.sidebar-footer { padding: 6px 8px; border-top: 1px solid var(--border); display: flex; gap: 4px; }
.sidebar-footer .btn { flex: 1; text-align: center; }

/* 下拉菜单 */
.dropdown { position: relative; }
.dropdown-menu { position: absolute; top: calc(100% + 4px); right: 0; min-width: 160px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.15); padding: 4px; display: none; z-index: 100; }
.dropdown-menu.show { display: block; }
.dropdown-menu .menu-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text); transition: .12s; }
.dropdown-menu .menu-item:hover { background: var(--accent-soft); color: var(--accent); }
.dropdown-menu .menu-item .menu-icon { font-size: 15px; width: 18px; text-align: center; }
.dropdown-menu .menu-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* 新建闪烁 */
@keyframes flash-new { 0% { background: var(--accent-soft); } 100% { background: transparent; } }
.doc-item.flash { animation: flash-new 1s ease-out; }

/* Toast */
.toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: .25s; z-index: 200; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* 登录 */
.login-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 340px; text-align: center; }
.login-box h1 { font-size: 24px; margin-bottom: 8px; }
.login-box p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
.login-box input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; margin-bottom: 16px; }
.login-box button { width: 100%; padding: 12px; border-radius: 10px; border: 0; cursor: pointer; background: var(--accent); color: #fff; font-size: 15px; font-weight: 600; }

@media (max-width: 768px) { .editor-area { padding: 16px; } .sidebar { display: none; } }
</style>
</head>
<body>
<!-- 登录 -->
<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h1>✏️ Markdown</h1>
    <p>输入密码进入</p>
    <input type="password" id="passwordInput" placeholder="访问密码" onkeyup="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">进入</button>
  </div>
</div>

<div class="layout" id="mainApp" style="display:none">
  <header>
    <h1>✏️ Markdown</h1>
    <div class="header-right">
      <button class="btn" onclick="saveDoc()" id="saveBtn">💾 保存</button>
      <div class="dropdown">
        <button class="btn icon" onclick="toggleDropdown(event)">⋯</button>
        <div class="dropdown-menu" id="ddMenu">
          <div class="menu-item" onclick="insertTemplate();closeDropdown()"><span class="menu-icon">📋</span> 插入模板</div>
          <div class="menu-item" onclick="downloadMD();closeDropdown()"><span class="menu-icon">⬇️</span> 下载 MD</div>
          <div class="menu-item" onclick="document.getElementById('uploadFile').click();closeDropdown()"><span class="menu-icon">📤</span> 导入文件（可多选）</div>
          <div class="menu-item" onclick="exportAll();closeDropdown()"><span class="menu-icon">📦</span> 导出全部</div>
          <div class="menu-item" onclick="copyHTML();closeDropdown()"><span class="menu-icon">📄</span> 复制 HTML</div>
          <div class="menu-sep"></div>
          <div class="menu-item" onclick="toggleTheme();closeDropdown()"><span class="menu-icon" id="themeIcon">🌙</span> 切换主题</div>
          <div class="menu-item" onclick="logout();closeDropdown()"><span class="menu-icon">🚪</span> 退出</div>
        </div>
      </div>
      <input type="file" id="uploadFile" accept=".md,.txt,.markdown,.json" multiple style="display:none" onchange="uploadFile(event)">
    </div>
  </header>
  <div class="main-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>📄 文档</h2>
      </div>
      <div class="sidebar-list" id="docList"></div>
      <div class="sidebar-footer">
        <button class="btn" onclick="newDoc()">＋ 新建文档</button>
        <button class="btn" onclick="newFolder()" style="flex:0 0 auto;padding:5px 10px;">📁＋</button>
      </div>
    </aside>
    <div class="editor-scroll" id="scroll">
      <div class="editor-area" id="editor"></div>
    </div>
  </div>
  <div class="statusbar">
    <span id="charCount">0 字 · 0 行</span>
    <span id="docStatus">未保存</span>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── 全局变量（提前声明避免 TDZ）──
let token = localStorage.getItem("md_token") || "";
let currentDocId = null;
let docs = [];
let lines = [];
let activeLine = -1;
let expandedFolders = {};

// ── 认证 ──
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ── 下拉菜单 ──
function toggleDropdown(e) { e.stopPropagation(); document.getElementById("ddMenu").classList.toggle("show"); }
function closeDropdown() { document.getElementById("ddMenu").classList.remove("show"); }
document.addEventListener("click", closeDropdown);

// ── Toast ──
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => el.classList.remove("show"), 2000);
}

async function doLogin() {
  const pw = document.getElementById("passwordInput").value;
  if (!pw) return;
  token = pw;
  const r = await api("GET", "/docs");
  if (r.success !== false) { localStorage.setItem("md_token", token); showApp(); }
  else alert("密码错误");
}
function logout() { localStorage.removeItem("md_token"); token = ""; location.reload(); }

async function api(method, path, body) {
  const opts = { method, headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  try { const r = await fetch("/api" + path, opts); return await r.json(); }
  catch (e) { return { success: false, error: e.message }; }
}

async function showApp() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("mainApp").style.display = "flex";
  const t = document.documentElement.getAttribute("data-theme") || "light";
  const icon = document.getElementById("themeIcon");
  if (icon) icon.textContent = t === "light" ? "🌙" : "☀️";
  await loadDocList();
  if (docs.length > 0) await openDoc(docs[0].id);
  else newDoc();
}

// ── 文档管理 ──

async function loadDocList() {
  const r = await api("GET", "/docs");
  docs = r.data || [];
  renderDocList();
}

function renderDocList() {
  const el = document.getElementById("docList");
  if (!docs.length) { el.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:12px;">暂无文档，点击下方新建</div>'; return; }

  // 按文件夹分组
  const folders = {};
  docs.forEach(d => {
    const f = d.folder || "默认";
    if (!folders[f]) folders[f] = [];
    folders[f].push(d);
  });

  let html = "";
  Object.keys(folders).sort().forEach(folder => {
    const items = folders[folder];
    const collapsed = expandedFolders[folder] === false;
    html += `<div class="folder-group">
      <div class="folder-header ${collapsed ? "collapsed" : ""}" onclick="toggleFolder('${esc(folder)}')">
        <span class="folder-arrow">▼</span>
        <span class="folder-name">${esc(folder)}</span>
        <span class="folder-count">${items.length}</span>
        <span class="folder-del" onclick="event.stopPropagation();delFolder('${esc(folder)}')">🗑️</span>
      </div>
      <div class="folder-items ${collapsed ? "collapsed" : ""}">
        ${items.map(d => `
          <div class="doc-item ${currentDocId === d.id ? "active" : ""} ${d._flash ? "flash" : ""}" onclick="openDoc(${d.id})">
            <span class="doc-del" onclick="event.stopPropagation();delDoc(${d.id})">🗑️</span>
            <div class="doc-title">${esc(d.title || "无标题")}</div>
            <div class="doc-time">${(d.updated_at || "").slice(5,16)}</div>
          </div>`).join("")}
      </div>
    </div>`;
    // 清除 flash 标记
    items.forEach(d => delete d._flash);
  });
  el.innerHTML = html;
}

function toggleFolder(name) {
  if (expandedFolders[name] === false) delete expandedFolders[name];
  else expandedFolders[name] = false;
  renderDocList();
}

async function delFolder(name) {
  const items = docs.filter(d => (d.folder || "默认") === name);
  if (!items.length) { toast("文件夹为空"); return; }
  if (!confirm(`确定删除文件夹「${name}」下的 ${items.length} 个文档？`)) return;
  for (const d of items) {
    await api("DELETE", "/docs/" + d.id);
  }
  if (items.some(d => d.id === currentDocId)) { currentDocId = null; newDoc(); }
  await loadDocList();
  toast("已删除 " + items.length + " 个文档");
}

function newFolder() {
  const name = prompt("文件夹名称：");
  if (!name) return;
  // 创建一个空文档到新文件夹，然后立即删除文档（只留文件夹）
  // 更好的方式：直接在前端记录空文件夹
  toast("文件夹「" + name + "」已创建，新建文档时可选此文件夹");
  expandedFolders[name] = true;
  // 如果没有文档，显示空文件夹
  if (docs.length === 0) {
    docs = [];
    renderDocList();
    // 手动插入空文件夹显示
    const el = document.getElementById("docList");
    el.innerHTML = `<div class="folder-group">
      <div class="folder-header" onclick="toggleFolder('${esc(name)}')">
        <span class="folder-arrow">▼</span>
        <span class="folder-name">${esc(name)}</span>
        <span class="folder-count">0</span>
      </div>
      <div class="folder-items">
        <div style="color:var(--muted);font-size:12px;padding:8px 12px 8px 28px;">空文件夹</div>
      </div>
    </div>`;
  }
}

async function openDoc(id) {
  // 先保存当前
  if (currentDocId) await saveDocSilent();
  const r = await api("GET", "/docs/" + id);
  if (!r.success) return;
  currentDocId = id;
  const text = r.data.content || "";
  initLines(text);
  renderAll();
  renderDocList();
  document.getElementById("docStatus").textContent = "已保存";
}

async function newDoc() {
  if (currentDocId) await saveDocSilent();
  currentDocId = null;
  initLines("");
  renderAll();
  renderDocList();
  document.getElementById("docStatus").textContent = "新文档（未保存）";
  toast("新文档已创建，开始输入吧");
  // 自动聚焦第一行
  setTimeout(() => { if (editor.children[0]) editor.children[0].focus(); }, 100);
}

async function saveDoc() {
  const text = lines.map(l => l.text).join("\n");
  const title = lines.find(l => /^#\s/.test(l.text.trim()))?.text?.replace(/^#\s+/, "")?.trim() || text.split("\n")[0]?.slice(0, 50) || "无标题";
  // 获取当前文档的文件夹
  const curDoc = docs.find(d => d.id === currentDocId);
  const folder = curDoc?.folder || "默认";
  if (currentDocId) {
    await api("PUT", "/docs/" + currentDocId, { title, content: text });
  } else {
    const r = await api("POST", "/docs", { title, content: text, folder });
    if (r.success) currentDocId = r.data.id;
  }
  await loadDocList();
  // 标记当前文档闪烁
  const d = docs.find(x => x.id === currentDocId);
  if (d) d._flash = true;
  renderDocList();
  document.getElementById("docStatus").textContent = "已保存 " + new Date().toLocaleTimeString();
  toast("已保存");
}

async function saveDocSilent() {
  if (!currentDocId) return;
  const text = lines.map(l => l.text).join("\n");
  await api("PUT", "/docs/" + currentDocId, { content: text });
}

async function delDoc(id) {
  if (!confirm("确定删除此文档？")) return;
  await api("DELETE", "/docs/" + id);
  if (currentDocId === id) { currentDocId = null; newDoc(); }
  await loadDocList();
}

// ── 导入导出 ──
async function exportAll() {
  const r = await api("GET", "/docs/export");
  const data = r.data || [];
  // 每个文档导出为单独的 .md 文件（打包成 zip 不现实，改为逐个下载）
  if (data.length === 0) { alert("没有文档可导出"); return; }
  if (data.length === 1) {
    downloadFile(data[0].title + ".md", data[0].content);
    return;
  }
  // 多个文档合并成一个 JSON 下载
  const json = JSON.stringify(data.map(d => ({ title: d.title, content: d.content })), null, 2);
  downloadFile("documents-export.json", json);
}

function downloadFile(name, content) {
  const blob = new Blob([content], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}

async function uploadFile(event) {
  const files = Array.from(event.target.files);
  if (!files.length) return;

  // JSON 批量导入
  if (files.length === 1 && files[0].name.endsWith(".json")) {
    try {
      const text = await files[0].text();
      const arr = JSON.parse(text);
      const r = await api("POST", "/docs/import", arr);
      toast("批量导入成功：" + (r.imported || 0) + " 篇");
      await loadDocList();
    } catch(e) { toast("JSON 解析失败"); }
    event.target.value = "";
    return;
  }

  // 多个 .md 文件批量导入（分批提交，每批20个）
  const batch = [];
  for (const file of files) {
    const text = await file.text();
    const title = file.name.replace(/\.md$|\.txt$|\.markdown$/, "");
    batch.push({ title, content: text, folder: "导入" });
  }
  const total = batch.length;
  let imported = 0;
  const CHUNK = 20;
  for (let i = 0; i < batch.length; i += CHUNK) {
    const chunk = batch.slice(i, i + CHUNK);
    const r = await api("POST", "/docs/import", chunk);
    imported += r.imported || 0;
    toast(`导入中... ${imported}/${total}`);
  }
  toast("导入成功：" + imported + " 篇");
  await loadDocList();
  if (docs.length > 0) await openDoc(docs[0].id);
  event.target.value = "";
}

const editor = document.getElementById("editor");
const scroll = document.getElementById("scroll");

// ── 主题 ──
function toggleTheme() {
  const cur = document.documentElement.getAttribute("data-theme") || "light";
  const next = cur === "light" ? "dark" : "light";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("md_theme", next);
  const icon = document.getElementById("themeIcon");
  if (icon) icon.textContent = next === "light" ? "🌙" : "☀️";
}

// ── Markdown 单行渲染 ──
function renderLine(text, inCodeBlock) {
  // 代码块内：原样显示
  if (inCodeBlock) {
    return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
  let html = text;
  if (!html.trim()) return "";
  html = html.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  // 行内代码先提取
  const codes = [];
  html = html.replace(/`([^`]+)`/g, (m, c) => { codes.push(c); return `\x00${codes.length-1}\x00`; });
  // 代码块标记行：```lang 或 ```
  const fenceMatch = html.trim().match(/^```(\w*)$/);
  if (fenceMatch) {
    const lang = fenceMatch[1];
    return lang ? `<div class="code-fence" data-lang="${lang}">${lang}</div>` : `<div class="code-fence">code</div>`;
  }
  // 标题
  if (/^######\s/.test(html)) html = `<h6>${html.replace(/^######\s+/, "")}</h6>`;
  else if (/^#####\s/.test(html)) html = `<h5>${html.replace(/^#####\s+/, "")}</h5>`;
  else if (/^####\s/.test(html)) html = `<h4>${html.replace(/^####\s+/, "")}</h4>`;
  else if (/^###\s/.test(html)) html = `<h3>${html.replace(/^###\s+/, "")}</h3>`;
  else if (/^##\s/.test(html)) html = `<h2>${html.replace(/^##\s+/, "")}</h2>`;
  else if (/^#\s/.test(html)) html = `<h1>${html.replace(/^#\s+/, "")}</h1>`;
  else if (/^---+$/.test(html.trim())) html = "<hr>";
  else if (/^&gt;\s?/.test(html)) html = `<blockquote><p>${html.replace(/^&gt;\s?/, "")}</p></blockquote>`;
  else if (/^-\s\[(x|X|\s)\]\s/.test(html)) {
    const checked = /\[x|X\]/.test(html) ? "checked" : "";
    const t2 = html.replace(/^-\s\[(x|X|\s)\]\s/, "");
    html = `<ul><li class="checkbox"><input type="checkbox" ${checked} disabled> ${t2}</li></ul>`;
  }
  else if (/^[-*+]\s+/.test(html)) html = `<ul><li>${html.replace(/^[-*+]\s+/, "")}</li></ul>`;
  else if (/^\d+\.\s+/.test(html)) html = `<ol><li>${html.replace(/^\d+\.\s+/, "")}</li></ol>`;
  else if (/^\|.*\|$/.test(html.trim())) {
    const cells = html.trim().split("|").map(s => s.trim()).filter(s => s !== "");
    if (/^[-:\s]+$/.test(cells.join(""))) html = "";
    else html = `<table><tr>${cells.map(c => `<td>${c}</td>`).join("")}</tr></table>`;
  }
  else html = `<p>${html}</p>`;
  // 还原行内代码
  html = html.replace(/\x00(\d+)\x00/g, (m, i) => `<code>${codes[parseInt(i)]}</code>`);
  // 粗体斜体删除线
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>");
  html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
  html = html.replace(/~~(.+?)~~/g, "<del>$1</del>");
  // 链接图片
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  return html;
}

// ── 初始化行（标记代码块）──
function initLines(text) {
  lines = text.split("\n").map(t => ({ text: t, html: "", inCode: false }));
  let inCode = false;
  for (let i = 0; i < lines.length; i++) {
    const isFence = /^```\w*$/.test(lines[i].text.trim());
    if (isFence) {
      lines[i].inCode = false;
      lines[i].html = renderLine(lines[i].text, false);
      inCode = !inCode;
    } else {
      lines[i].inCode = inCode;
      lines[i].html = renderLine(lines[i].text, inCode);
    }
  }
  if (lines.length === 0) lines.push({ text: "", html: "", inCode: false });
}

// ── 创建行元素 ──
function createLineEl(i) {
  const div = document.createElement("div");
  div.className = "line" + (lines[i].text.trim() === "" ? " empty" : "") + (lines[i].inCode ? " code-line" : "");
  div.dataset.index = i;
  div.dataset.inCode = lines[i].inCode ? "1" : "0";
  div.contentEditable = "true";
  div.spellcheck = false;
  div.innerHTML = lines[i].html || "";

  // focus: 显示源码
  div.addEventListener("focus", function() {
    onLineFocus(i);
  });

  // input: 实时保存源码到内存
  div.addEventListener("input", function() {
    if (div.classList.contains("editing")) {
      lines[i].text = div.textContent;
    }
  });

  // blur: 兜底渲染
  div.addEventListener("blur", function() {
    if (activeLine === i) {
      commitLine(i);
      activeLine = -1;
      saveContent();
    }
  });

  return div;
}

// ── 全量渲染 ──
function renderAll() {
  editor.innerHTML = "";
  if (lines.length === 0) lines.push({ text: "", html: "" });
  lines.forEach((_, i) => {
    editor.appendChild(createLineEl(i));
  });
  updateStatus();
}

// ── 行聚焦：换成源码 ──
function onLineFocus(i) {
  // 先渲染上一行
  if (activeLine >= 0 && activeLine !== i) {
    commitLine(activeLine);
  }
  activeLine = i;
  const div = editor.children[i];
  if (!div) return;
  div.classList.add("editing");
  div.textContent = lines[i].text;
  // 光标放末尾
  const sel = window.getSelection();
  const range = document.createRange();
  range.selectNodeContents(div);
  range.collapse(false);
  sel.removeAllRanges();
  sel.addRange(range);
}

// ── 提交行：换成渲染（从内存读源码）──
function commitLine(i) {
  const div = editor.children[i];
  if (!div) return;
  // 从内存读取（input 事件已实时保存）
  const text = lines[i].text;
  // 重新计算代码块状态（当前行及后续行）
  recomputeCodeBlocks(i);
  div.classList.remove("editing");
  div.classList.toggle("empty", text.trim() === "");
  div.innerHTML = lines[i].html || "";
}

// 重新计算从第 i 行开始的代码块状态
function recomputeCodeBlocks(fromLine) {
  let inCode = false;
  for (let j = 0; j <= fromLine && j < lines.length; j++) {
    if (/^```\w*$/.test(lines[j].text.trim())) {
      inCode = !inCode;
    }
  }
  for (let i = fromLine; i < lines.length; i++) {
    const isFence = /^```\w*$/.test(lines[i].text.trim());
    if (isFence) {
      lines[i].inCode = false;
      lines[i].html = renderLine(lines[i].text, false);
      inCode = !inCode;
    } else {
      lines[i].inCode = inCode;
      lines[i].html = renderLine(lines[i].text, inCode);
    }
  }
}

// ── 行失焦 ──（去掉 blur 依赖，改为主动触发）
function onLineBlur(i) {
  // 不做任何事，渲染由 onLineFocus/Enter/方向键 主动触发
}

// ── 渲染当前行并切到目标行 ──
function switchToLine(targetIndex) {
  if (activeLine >= 0 && activeLine !== targetIndex) {
    commitLine(activeLine);
    activeLine = -1;
    saveContent();
  }
  const div = editor.children[targetIndex];
  if (div) {
    onLineFocus(targetIndex);
  }
}

// ── 键盘处理 ──
editor.addEventListener("keydown", (e) => {
  const target = e.target.closest(".line");
  if (!target) return;
  const i = parseInt(target.dataset.index);

  // Enter: 拆分新行，当前行立即渲染
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    // 从内存读源码（input 事件已实时保存），不从 DOM 读
    const fullText = lines[i].text;
    const offset = getCaretOffset(target);
    const before = fullText.slice(0, offset);
    const after = fullText.slice(offset);

    // 提交当前行（渲染）
    lines[i].text = before;
    lines[i].html = renderLine(before);
    target.classList.remove("editing");
    target.classList.toggle("empty", before.trim() === "");
    target.innerHTML = lines[i].html || "";

    // 插入新行
    lines.splice(i + 1, 0, { text: after, html: "", inCode: false });
    recomputeCodeBlocks(i + 1);
    const newDiv = createLineEl(i + 1);
    editor.insertBefore(newDiv, target.nextSibling);
    // 更新后续行的 DOM（代码块状态可能变了）
    for (let j = i + 2; j < editor.children.length; j++) {
      editor.children[j].className = "line" + (lines[j].text.trim() === "" ? " empty" : "") + (lines[j].inCode ? " code-line" : "");
      editor.children[j].innerHTML = lines[j].html || "";
    }
    refreshIndices();
    newDiv.focus();
    saveContent();
    return;
  }

  // 上方向键：渲染当前行，跳到上一行
  if (e.key === "ArrowUp" && i > 0) {
    const offset = getCaretOffset(target);
    // 只在光标在第一行时才跳（简化：直接跳）
    e.preventDefault();
    commitLine(i);
    activeLine = -1;
    saveContent();
    const prevDiv = editor.children[i - 1];
    prevDiv.focus();
    return;
  }

  // 下方向键：渲染当前行，跳到下一行
  if (e.key === "ArrowDown" && i < editor.children.length - 1) {
    e.preventDefault();
    commitLine(i);
    activeLine = -1;
    saveContent();
    const nextDiv = editor.children[i + 1];
    nextDiv.focus();
    return;
  }

  // Backspace: 行首合并
  if (e.key === "Backspace") {
    const offset = getCaretOffset(target);
    if (offset === 0 && i > 0) {
      e.preventDefault();
      const curText = lines[i].text;  // 从内存读
      const prevText = lines[i - 1].text;  // 从内存读
      const mergeText = prevText + curText;

      lines[i - 1].text = mergeText;
      lines[i - 1].html = renderLine(mergeText);
      lines.splice(i, 1);
      renderAll();

      const newPrev = editor.children[i - 1];
      newPrev.focus();
      setTimeout(() => {
        newPrev.classList.add("editing");
        newPrev.textContent = mergeText;
        const r = document.createRange();
        const sel = window.getSelection();
        if (newPrev.firstChild) {
          r.setStart(newPrev.firstChild, prevText.length);
          r.collapse(true);
          sel.removeAllRanges();
          sel.addRange(r);
        }
      }, 0);
      activeLine = i - 1;
      saveContent();
    }
  }

  // Tab 缩进
  if (e.key === "Tab") {
    e.preventDefault();
    document.execCommand("insertText", false, "  ");
  }
});

// 获取光标在元素中的字符偏移
function getCaretOffset(el) {
  const sel = window.getSelection();
  if (sel.rangeCount === 0) return 0;
  const range = sel.getRangeAt(0);
  const preRange = range.cloneRange();
  preRange.selectNodeContents(el);
  preRange.setEnd(range.endContainer, range.endOffset);
  return preRange.toString().length;
}

// 粘贴纯文本
editor.addEventListener("paste", (e) => {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData("text");
  document.execCommand("insertText", false, text);
});

function refreshIndices() {
  for (let i = 0; i < editor.children.length; i++) {
    editor.children[i].dataset.index = i;
  }
}

// ── 保存 ──
function saveContent() {
  const text = lines.map(l => l.text).join("\n");
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(() => localStorage.setItem("md_content", text), 500);
  updateStatus();
}

function updateStatus() {
  const text = lines.map(l => l.text).join("");
  document.getElementById("charCount").textContent = text.length + " 字 · " + lines.length + " 行";
}

// ── 文件操作 ──
function downloadMD() {
  const text = lines.map(l => l.text).join("\n");
  const blob = new Blob([text], { type: "text/markdown" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "document-" + new Date().toISOString().slice(0,10) + ".md";
  a.click();
}

  const html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><style>body{font-family:sans-serif;max-width:760px;margin:40px auto;padding:0 20px;line-height:1.8;}pre{background:#f5f5f5;padding:16px;border-radius:8px;}code{background:#f5f5f5;padding:2px 6px;border-radius:4px;}blockquote{border-left:4px solid #30CF79;padding-left:16px;color:#666;}table{border-collapse:collapse;width:100%;}th,td{border:1px solid #ddd;padding:8px;}img{max-width:100%;}</style></head><body>" + lines.map(l => l.html).join("\n") + "</body></html>";
  navigator.clipboard.writeText(html).then(() => toast("HTML 已复制"));
}
